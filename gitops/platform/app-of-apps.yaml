apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: saasobserve-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/apolzek/saasobserve.git
    targetRevision: main
    path: charts/platform
    helm:
      releaseName: platform
      valueFiles:
        - values.yaml
        - ../../gitops/tenants/gateway-tenants.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: saasobserve-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
