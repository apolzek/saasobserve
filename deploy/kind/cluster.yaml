kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: saasobserve
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 28080
        protocol: TCP
      - containerPort: 443
        hostPort: 28443
        protocol: TCP
      - containerPort: 30318  # OTLP HTTP gateway
        hostPort: 4318
        protocol: TCP
      - containerPort: 30317  # OTLP gRPC gateway
        hostPort: 4317
        protocol: TCP
  - role: worker
  - role: worker
