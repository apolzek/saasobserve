apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-webhook
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.authWebhook.replicas }}
  selector: { matchLabels: { app: auth-webhook } }
  template:
    metadata: { labels: { app: auth-webhook } }
    spec:
      containers:
        - name: auth-webhook
          image: "{{ .Values.images.authWebhook.repo }}:{{ .Values.images.authWebhook.tag }}"
          imagePullPolicy: {{ .Values.images.authWebhook.pullPolicy }}
          env:
            - { name: ADDR, value: ":8090" }
            - { name: API_URL, value: "http://api.{{ .Values.namespace }}.svc.cluster.local:8080" }
          ports: [{ containerPort: 8090 }]
          readinessProbe:
            httpGet: { path: /healthz, port: 8090 }
            initialDelaySeconds: 2
          resources: {{- include "platform.resources" (dict "Values" .Values "component" "authWebhook") | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: auth-webhook
  namespace: {{ .Values.namespace }}
spec:
  selector: { app: auth-webhook }
  ports: [{ name: http, port: 8090, targetPort: 8090 }]
