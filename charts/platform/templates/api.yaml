apiVersion: v1
kind: Secret
metadata:
  name: api
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  GOOGLE_CLIENT_ID: {{ .Values.api.google.clientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.api.google.clientSecret | quote }}
  SESSION_SECRET: {{ .Values.api.sessionSecret | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api } }
    spec:
      containers:
        - name: api
          image: "{{ .Values.images.api.repo }}:{{ .Values.images.api.tag }}"
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          env:
            - { name: ADDR, value: ":8080" }
            - { name: PUBLIC_BASE_URL, value: {{ .Values.api.publicBaseUrl | quote }} }
            - { name: GRAFANA_BASE_DOMAIN, value: {{ .Values.api.grafanaBaseDomain | quote }} }
            - { name: PROVISIONER_URL, value: "http://provisioner.{{ .Values.namespace }}.svc.cluster.local:8091" }
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: postgres, key: DATABASE_URL } }
          envFrom:
            - secretRef: { name: api }
          ports: [{ containerPort: 8080 }]
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
          resources: {{- include "platform.resources" (dict "Values" .Values "component" "api") | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: {{ .Values.namespace }}
spec:
  selector: { app: api }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
