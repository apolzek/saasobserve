apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: otlp
  namespace: {{ .Values.namespace }}
  annotations:
    # Require a valid X-Tenant-Key. auth-webhook validates the key and returns
    # the tenant id in the X-Saasobserve-Tenant header, which we propagate to
    # the upstream gateway collector.
    nginx.ingress.kubernetes.io/auth-url: "http://auth-webhook.{{ .Values.namespace }}.svc.cluster.local:8090/validate"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Saasobserve-Tenant"
    nginx.ingress.kubernetes.io/auth-snippet: |
      proxy_set_header X-Original-URI $request_uri;
      proxy_set_header X-Tenant-Key $http_x_tenant_key;
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Saasobserve-Tenant $auth_resp_x_saasobserve_tenant;
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: gateway-otelcol
                port: { number: 4318 }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ui
  namespace: {{ .Values.namespace }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: app.saasobserve.local
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend: { service: { name: api, port: { number: 8080 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: ui, port: { number: 3000 } } }
