{{- if ne .Values.storage.storageClass "" }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoria-metrics-data
  labels: {{- include "tenant.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.storage.storageClass }}
  resources: { requests: { storage: {{ .Values.storage.victoriametrics }} } }
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-metrics
  labels: {{- include "tenant.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: victoria-metrics } }
  template:
    metadata:
      labels:
        app: victoria-metrics
        {{- include "tenant.labels" . | nindent 8 }}
    spec:
      containers:
        - name: vm
          image: {{ .Values.images.victoriametrics }}
          args:
            - "-storageDataPath=/data"
            - "-retentionPeriod=30d"
            - "-httpListenAddr=:8428"
          ports:
            - { name: http, containerPort: 8428 }
          volumeMounts:
            - { name: data, mountPath: /data }
          resources: {{- include "tenant.resources" (dict "Values" .Values "component" "victoriametrics") | nindent 12 }}
      volumes:
        - name: data
          {{- include "tenant.storage" (dict "storageClass" .Values.storage.storageClass "claimName" "victoria-metrics-data") | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: victoria-metrics
  labels: {{- include "tenant.labels" . | nindent 4 }}
spec:
  selector: { app: victoria-metrics }
  ports:
    - { name: http, port: 8428, targetPort: 8428 }
