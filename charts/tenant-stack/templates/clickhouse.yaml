{{- if ne .Values.storage.storageClass "" }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-data
  labels: {{- include "tenant.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.storage.storageClass }}
  resources: { requests: { storage: {{ .Values.storage.clickhouse }} } }
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  labels: {{- include "tenant.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: clickhouse } }
  template:
    metadata:
      labels:
        app: clickhouse
        {{- include "tenant.labels" . | nindent 8 }}
    spec:
      containers:
        - name: clickhouse
          image: {{ .Values.images.clickhouse }}
          env:
            - { name: CLICKHOUSE_DB, value: otel }
            - { name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT, value: "1" }
          ports:
            - { name: native,  containerPort: 9000 }
            - { name: http,    containerPort: 8123 }
          volumeMounts:
            - { name: data, mountPath: /var/lib/clickhouse }
          resources: {{- include "tenant.resources" (dict "Values" .Values "component" "clickhouse") | nindent 12 }}
      volumes:
        - name: data
          {{- include "tenant.storage" (dict "storageClass" .Values.storage.storageClass "claimName" "clickhouse-data") | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  labels: {{- include "tenant.labels" . | nindent 4 }}
spec:
  selector: { app: clickhouse }
  ports:
    - { name: native, port: 9000, targetPort: 9000 }
    - { name: http,   port: 8123, targetPort: 8123 }
