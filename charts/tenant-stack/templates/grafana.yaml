apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  labels: {{- include "tenant.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        uid: tenant-metrics
        url: http://victoria-metrics:8428
        access: proxy
        isDefault: true
      - name: ClickHouse-Logs
        type: grafana-clickhouse-datasource
        uid: tenant-logs
        jsonData:
          host: clickhouse
          port: 9000
          protocol: native
          defaultDatabase: otel
          logs:
            defaultTable: otel_logs
      - name: ClickHouse-Traces
        type: grafana-clickhouse-datasource
        uid: tenant-traces
        jsonData:
          host: clickhouse
          port: 9000
          protocol: native
          defaultDatabase: otel
          traces:
            defaultTable: otel_traces
  grafana.ini: |
    [server]
    root_url = https://{{ .Values.grafana.ingress.host }}
    [security]
    admin_user = {{ .Values.grafana.adminUser }}
    admin_password = {{ .Values.grafana.adminPassword }}
    [auth.anonymous]
    enabled = false
    {{- if .Values.grafana.oidc.enabled }}
    [auth.generic_oauth]
    enabled = true
    name = Google
    client_id = {{ .Values.grafana.oidc.clientId }}
    client_secret = {{ .Values.grafana.oidc.clientSecret }}
    scopes = openid profile email
    auth_url = {{ .Values.grafana.oidc.authUrl }}
    token_url = {{ .Values.grafana.oidc.tokenUrl }}
    api_url  = {{ .Values.grafana.oidc.apiUrl }}
    allowed_domains = {{ .Values.grafana.oidc.allowedDomains }}
    allow_sign_up = true
    {{- end }}
---
{{- if ne .Values.storage.storageClass "" }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  labels: {{- include "tenant.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.storage.storageClass }}
  resources: { requests: { storage: {{ .Values.storage.grafana }} } }
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels: {{- include "tenant.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: grafana } }
  template:
    metadata:
      labels:
        app: grafana
        {{- include "tenant.labels" . | nindent 8 }}
    spec:
      containers:
        - name: grafana
          image: {{ .Values.images.grafana }}
          env:
            - { name: GF_INSTALL_PLUGINS, value: "grafana-clickhouse-datasource" }
            - { name: GF_PATHS_PROVISIONING, value: /etc/grafana/provisioning }
          ports:
            - { name: http, containerPort: 3000 }
          volumeMounts:
            - { name: storage, mountPath: /var/lib/grafana }
            - { name: ini, mountPath: /etc/grafana/grafana.ini, subPath: grafana.ini }
            - { name: ds,  mountPath: /etc/grafana/provisioning/datasources/datasources.yaml, subPath: datasources.yaml }
          resources: {{- include "tenant.resources" (dict "Values" .Values "component" "grafana") | nindent 12 }}
      volumes:
        - name: storage
          {{- include "tenant.storage" (dict "storageClass" .Values.storage.storageClass "claimName" "grafana-data") | nindent 10 }}
        - name: ini
          configMap:
            name: grafana-provisioning
            items: [{ key: grafana.ini, path: grafana.ini }]
        - name: ds
          configMap:
            name: grafana-provisioning
            items: [{ key: datasources.yaml, path: datasources.yaml }]
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels: {{- include "tenant.labels" . | nindent 4 }}
spec:
  selector: { app: grafana }
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
{{- if .Values.grafana.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  labels: {{- include "tenant.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.grafana.ingress.className }}
  rules:
    - host: {{ .Values.grafana.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: grafana, port: { number: 3000 } } }
{{- end }}
