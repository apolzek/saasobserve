apiVersion: v1
kind: ConfigMap
metadata:
  name: otelcol
  labels: {{- include "tenant.labels" . | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: {{ .Values.otelcol.receiverEndpoint }}:4317 }
          http: { endpoint: {{ .Values.otelcol.receiverEndpoint }}:4318 }
    processors:
      memory_limiter:
        check_interval: 2s
        limit_percentage: 85
        spike_limit_percentage: 25
      batch:
        timeout: {{ .Values.otelcol.batch.timeout }}
        send_batch_size: {{ .Values.otelcol.batch.sendBatchSize }}
      resource:
        attributes:
          - { key: tenant.id, value: {{ .Values.tenant.id | quote }}, action: upsert }
    exporters:
      prometheusremotewrite:
        endpoint: http://victoria-metrics:8428/api/v1/write
        resource_to_telemetry_conversion: { enabled: true }
      clickhouse:
        endpoint: tcp://clickhouse:9000?dial_timeout=10s
        database: otel
        logs_table_name: otel_logs
        traces_table_name: otel_traces
        create_schema: true
        ttl: 168h
      debug: { verbosity: basic }
    service:
      telemetry:
        metrics: { level: basic, address: 0.0.0.0:8888 }
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [clickhouse]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [clickhouse]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otelcol
  labels: {{- include "tenant.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector: { matchLabels: { app: otelcol } }
  template:
    metadata:
      labels:
        app: otelcol
        {{- include "tenant.labels" . | nindent 8 }}
    spec:
      containers:
        - name: otelcol
          image: {{ .Values.images.otelcol }}
          args: ["--config=/etc/otelcol/config.yaml"]
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
            - { name: metrics,   containerPort: 8888 }
          volumeMounts:
            - { name: config, mountPath: /etc/otelcol }
          resources: {{- include "tenant.resources" (dict "Values" .Values "component" "otelcol") | nindent 12 }}
      volumes:
        - name: config
          configMap: { name: otelcol }
---
apiVersion: v1
kind: Service
metadata:
  name: otelcol
  labels: {{- include "tenant.labels" . | nindent 4 }}
spec:
  selector: { app: otelcol }
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
    - { name: metrics,   port: 8888, targetPort: 8888 }
